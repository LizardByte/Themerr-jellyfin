<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Themerr</title>
</head>
<body>
    <div id="ThemerrConfigPage" data-role="page" class="page type-interior pluginConfigurationPage"
            data-require="emby-input,emby-button,emby-select,emby-checkbox">
        <div data-role="content">
            <div class="content-primary">
                <form class="tbsConfigurationPage">
                    <div class="sectionTitleContainer flex align-items-center">
                        <h2 class="sectionTitle">Themerr</h2>
                        <a is="emby-linkbutton" class="raised button-alt headerHelpButton emby-button" target="_blank"
                           href="https://app.lizardbyte.dev/support" data-localize="support_center">Support Center</a>
                    </div>
                    <div class="verticalSection">
                        <p data-localize="plugin_relies">This plugin relies on the TMDB provider.
                            Please make sure it is enabled!</p>
                        <br>
                    </div>
                </form>

                <form id="ThemerrConfigForm">
                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="UpdateInterval" data-localize="update_interval">
                            Update Interval
                        </label>
                        <input id="UpdateInterval" name="UpdateInterval"
                               type="number" is="emby-input" min="15" />
                        <div class="fieldDescription" data-localize="update_interval_desc">
                            The interval, in minutes, between theme song updates.
                        </div>
                    </div>
                    <div class="checkboxContainer checkboxContainer-withDescription">
                        <label style="display:flex; align-items:center; gap:0.4em; cursor:pointer;"
                               class="emby-checkbox-label">
                            <input id="BackupUserSuppliedTheme" name="BackupUserSuppliedTheme"
                                   type="checkbox" is="emby-checkbox"
                                   data-embycheckbox="true" class="emby-checkbox" />
                            <span class="checkboxLabel"
                                  data-localize="backup_user_supplied_theme">Create backup of user supplied mp3 during replace</span>
                            <span class="checkboxOutline">
                                <span class="material-icons checkboxIcon checkboxIcon-checked check" aria-hidden="true"></span>
                                <span class="material-icons checkboxIcon checkboxIcon-unchecked" aria-hidden="true"></span>
                            </span>
                        </label>
                        <div class="fieldDescription checkboxFieldDescription"
                             data-localize="backup_user_supplied_theme_desc">
                            When replacing a user supplied theme with the ThemerrDB version, save the original as theme.backup.mp3.
                        </div>
                    </div>
                    <div>
                        <button is="emby-button" type="submit" class="raised button-submit block emby-button">
                            <span data-localize="save">Save</span>
                        </button>
                    </div>
                    <br>
                    <div>
                        <button is="emby-button" type="button" class="raised block" id="refresh-library">
                            <span data-localize="update_theme_songs">Update Theme Songs</span>
                        </button>
                    </div>
                </form>
                <br>
                <br>
                <!-- Create Theme Progress Dashboard -->
                <form>
                    <div id="ThemerrDashboard" style="display: none;">
                        <h2 data-localize="completion_dashboard">Completion Dashboard</h2>
                    </div>
                </form>
            </div>
        </div>

        <script type="text/javascript">
        (function() {
            function getThemerrConfig() {
                return {
                    pluginUniqueId: 'e41ef0c4-c413-41ba-b4fa-8c565dc3c969'
                }
            }

            function getLogPrefix() {
                return '[Themerr] - '
            }

            ThemerrConfig = getThemerrConfig()
            LogPrefix = getLogPrefix()

            let activeFilter = 'all'

            const FILTER_PREDICATES = {
                all: () => true,
                user_not_in_db: i => i.theme_provider === 'user' && i.in_themerr_db !== true,
                user_in_db: i => i.theme_provider === 'user' && i.in_themerr_db === true,
                no_theme_in_db: i => !i.theme_provider && i.in_themerr_db === true,
                no_theme_not_in_db: i => !i.theme_provider && i.in_themerr_db !== true,
                themerr_supplied: i => i.theme_provider === 'themerr',
            }

            const STATUS_CONFIG = {
                themerr: { icon: 'check', color: '#00ff00', key: 'themerr_provided' },
                user: { icon: 'person', color: '#00a4dc', key: 'user_provided' },
            }

            // if ApiClient is not defined, define it
            if (typeof ApiClient === 'undefined') {
                _ApiClient = new ApiClient()
            }
            else {
                _ApiClient = ApiClient
            }

            document.querySelector('#ThemerrConfigPage')
                .addEventListener('pageshow', function() {
                    Dashboard.showLoadingMsg()
                    _ApiClient.getPluginConfiguration(ThemerrConfig.pluginUniqueId).then(function (config) {
                        let updateInterval = config.UpdateInterval
                        if (updateInterval === undefined) {
                            updateInterval = config.updateInterval
                        }
                        document.querySelector('#UpdateInterval').value = updateInterval
                        let backupUserSuppliedTheme = config.BackupUserSuppliedTheme
                        if (backupUserSuppliedTheme === undefined) {
                            backupUserSuppliedTheme = config.backupUserSuppliedTheme
                        }
                        document.querySelector('#BackupUserSuppliedTheme').checked =
                            backupUserSuppliedTheme !== false
                        Dashboard.hideLoadingMsg()
                    })
                })

            document.querySelector('#ThemerrConfigForm')
                .addEventListener('submit', function(e) {
                    Dashboard.showLoadingMsg()
                    _ApiClient.getPluginConfiguration(ThemerrConfig.pluginUniqueId).then(function (config) {
                        let updateInterval = Number.parseInt(document.querySelector('#UpdateInterval').value, 10)
                        config.UpdateInterval = updateInterval
                        config.updateInterval = updateInterval
                        const backupChecked = document.querySelector('#BackupUserSuppliedTheme').checked
                        config.BackupUserSuppliedTheme = backupChecked
                        config.backupUserSuppliedTheme = backupChecked
                        _ApiClient.updatePluginConfiguration(ThemerrConfig.pluginUniqueId, config).then(function (result) {
                            Dashboard.processPluginConfigurationUpdateResult(result)
                        })
                    })

                    e.preventDefault()
                    return false
                })

            let translations = {};
            function getTranslations() {
                return new Promise((resolve, reject) => {
                    let request = {
                        url: _ApiClient.getUrl('/Themerr/GetTranslations'),
                        type: 'GET',
                        dataType: 'json'  // this should automatically return response.json()
                    }

                    _ApiClient.fetch(request).then(function (response) {
                        console.log(LogPrefix + "translations: " + response)

                        translations = response
                        resolve();  // Resolve the Promise when the request is complete
                    }).catch(function () {
                        // this message cannot be translated due to translations not being loaded
                        let message = "Unexpected error occurred getting translations."
                        Dashboard.alert({
                            message: message
                        })
                        console.log(LogPrefix + message)
                        reject();  // Reject the Promise if there's an error
                    })
                })
            }

            function translate(key) {
                if (translations['locale'] && translations['locale'][key] !== undefined) {
                    return translations['locale'][key];
                } else if (translations['fallback'] && translations['fallback'][key] !== undefined) {
                    return translations['fallback'][key];
                } else {
                    console.log(LogPrefix + "Error translating string: " + key);
                    return key;
                }
            }

            function download() {
                const btn = document.querySelector('#refresh-library')
                const btnSpan = btn.querySelector('span')
                const originalText = btnSpan.innerText
                btnSpan.innerText = translate('running_theme_update')
                btn.style.opacity = '0.6'
                btn.style.pointerEvents = 'none'

                _ApiClient.fetch({
                    url: _ApiClient.getUrl('/Themerr/TriggerUpdate'),
                    type: 'POST'
                }).then(function () {
                    let message = translate('updating_theme_songs')
                    Dashboard.alert(message)
                    console.log(LogPrefix + message)
                }).catch(function () {
                    let message = translate('unexpected_error_occured')
                    Dashboard.alert({
                        message: message
                    })
                    console.log(LogPrefix + message)
                }).finally(function () {
                    btnSpan.innerText = originalText
                    btn.style.opacity = ''
                    btn.style.pointerEvents = ''
                })
            }

            async function replaceWithThemerTheme(itemId, issueUrl, tableColumnContribute, tableColumnStatus, replaceButton) {
                const originalText = replaceButton.innerText;
                replaceButton.innerText = translate('replacing_button');
                replaceButton.style.opacity = '0.6';
                replaceButton.style.pointerEvents = 'none';

                try {
                    await _ApiClient.fetch({
                        url: _ApiClient.getUrl('/Themerr/ReplaceTheme/' + itemId),
                        type: 'POST',
                    });

                    tableColumnContribute.innerHTML = '';
                    let editButton = document.createElement('a');
                    editButton.setAttribute('is', 'emby-linkbutton');
                    editButton.setAttribute('class', 'raised button-submit block emby-button');
                    editButton.setAttribute('target', '_blank');
                    editButton.setAttribute('href', issueUrl);
                    editButton.innerText = translate('edit_button');
                    tableColumnContribute.appendChild(editButton);

                    tableColumnStatus.innerHTML = '';
                    const themerStatus = STATUS_CONFIG['themerr'];
                    let statusSpan = document.createElement('span');
                    let statusText = document.createElement('span');
                    statusSpan.setAttribute('class', 'material-icons');
                    statusText.setAttribute('class', 'detailTableBodyCell');
                    statusSpan.classList.add(themerStatus.icon);
                    statusSpan.setAttribute('style', 'margin-right: 6px; color: ' + themerStatus.color + ';');
                    statusText.innerText = translate(themerStatus.key);
                    tableColumnStatus.appendChild(statusSpan);
                    tableColumnStatus.appendChild(statusText);
                } catch (error) {
                    replaceButton.innerText = originalText;
                    replaceButton.style.opacity = '';
                    replaceButton.style.pointerEvents = '';
                    console.error(LogPrefix + 'Failed to replace theme: ' + error);
                }
            }

            async function updateProgress() {
                let request = {
                    url: _ApiClient.getUrl('/Themerr/GetProgress'),
                    type: 'GET',
                    dataType: 'json'
                };

                try {
                    let response = await _ApiClient.fetch(request);

                    console.log(LogPrefix + "total_media_count: " + response["total_media_count"]);
                    console.log(LogPrefix + "total_media_with_themes: " + response["total_media_with_themes"]);
                    console.log(LogPrefix + "generated_at: " + response["generated_at"]);

                    createDashboard(
                        response["total_media_count"],
                        response["total_media_with_themes"],
                        response["items"],
                        response["generated_at"]
                    );
                } catch (error) {
                    let message = translate('unexpected_error_occured_creating_dashboard');
                    Dashboard.alert({ message: message });
                    console.log(LogPrefix + message);
                    console.log(LogPrefix + error);
                }
            }

            function createDashboard(total_media_count, total_media_with_themes, all_items, generated_at) {
                // get dashboard container
                let ThemerrDashboard = document.querySelector('#ThemerrDashboard')

                // show the dashboard
                ThemerrDashboard.style.display = 'block'

                if (total_media_count === 0) {
                    let noDataMsg = document.createElement('p')
                    noDataMsg.innerText = translate('no_snapshot_yet')
                    ThemerrDashboard.appendChild(noDataMsg)
                    return
                }

                const themerr_count = all_items.filter(i => i.theme_provider === 'themerr').length
                const user_count = all_items.filter(i => i.theme_provider === 'user').length
                const no_theme_count = all_items.filter(i => !i.theme_provider).length

                function pct(n) { return total_media_count > 0 ? (n / total_media_count * 100).toFixed(1) : 0 }

                const progressSegments = [
                    { count: themerr_count, color: '#00a4dc', labelKey: 'themerr_provided' },
                    { count: user_count, color: '#ffc107', labelKey: 'user_provided' },
                    { count: no_theme_count, color: '#dc3545', labelKey: 'no_theme_song' },
                ]

                let progressBar = document.createElement('div')
                progressBar.setAttribute('style', 'display:flex; width:100%; height:24px; border-radius:4px; overflow:hidden; margin-bottom:0.75em;')

                for (const segment of progressSegments) {
                    if (segment.count === 0) continue
                    let segmentDiv = document.createElement('div')
                    const segmentPercentage = pct(segment.count)
                    segmentDiv.setAttribute('style',
                        'width:' + segmentPercentage + '%;' +
                        ' min-width:2px;' +
                        ' background:' + segment.color + ';' +
                        ' cursor:default;' +
                        ' display:flex; align-items:center; justify-content:center;' +
                        ' overflow:hidden; font-size:0.75em; font-weight:bold; color:#fff;'
                    )
                    segmentDiv.setAttribute('title', translate(segment.labelKey) + ': ' + segment.count + ' (' + p + '%)')
                    if (Number.parseFloat(p) >= 8) {
                        segmentDiv.innerText = p + '%'
                    }
                    progressBar.appendChild(segmentDiv)
                }

                ThemerrDashboard.appendChild(progressBar)

                if (generated_at) {
                    let generatedAtEl = document.createElement('p')
                    generatedAtEl.setAttribute('style', 'font-size: 0.85em; color: grey;')
                    generatedAtEl.innerText = translate('snapshot_generated_at') + ' ' + new Date(generated_at).toLocaleString()
                    ThemerrDashboard.appendChild(generatedAtEl)
                }

                // add break
                ThemerrDashboard.appendChild(document.createElement('br'))

                // replace all button container — above filter bar and table
                let replaceAllDiv = document.createElement('div')
                replaceAllDiv.setAttribute('style', 'margin-bottom: 0.75em;')
                ThemerrDashboard.appendChild(replaceAllDiv)

                // add break
                ThemerrDashboard.appendChild(document.createElement('br'))

                // filter dropdown
                let filterBar = document.createElement('div')
                filterBar.setAttribute('id', 'ThemerrFilterBar')
                filterBar.setAttribute('style', 'margin-bottom: 0.75em;')
                ThemerrDashboard.appendChild(filterBar)

                let filterSelect = document.createElement('select')
                filterSelect.setAttribute('is', 'emby-select')

                for (const [key] of Object.entries(FILTER_PREDICATES)) {
                    const count = all_items.filter(FILTER_PREDICATES[key]).length
                    let option = document.createElement('option')
                    option.setAttribute('value', key)
                    option.innerText = translate('filter_' + key) + ' (' + count + ')'
                    if (key === activeFilter) {
                        option.setAttribute('selected', 'selected')
                    }
                    filterSelect.appendChild(option)
                }

                filterSelect.addEventListener('change', () => {
                    activeFilter = filterSelect.value
                    refreshView()
                })

                filterBar.appendChild(filterSelect)

                // create table
                let table = document.createElement('table')
                table.setAttribute('id', 'ThemerrProgressTable')
                table.setAttribute('class', 'detailTable')
                ThemerrDashboard.appendChild(table)

                // create table header
                let tableHeader = document.createElement('thead')
                table.appendChild(tableHeader)

                // create table header row
                let tableHeaderRow = document.createElement('tr')
                tableHeader.appendChild(tableHeaderRow)

                let columns = ['Title', 'Year', 'Type', 'Contribute', 'Status']

                // create table header columns
                for (let column in columns) {
                    let tableHeaderColumn = document.createElement('th')
                    tableHeaderColumn.setAttribute('class', 'detailTableHeaderCell')
                    tableHeaderColumn.setAttribute('scope', 'col')
                    tableHeaderColumn.innerText = translate(columns[column].toLowerCase())
                    tableHeaderRow.appendChild(tableHeaderColumn)
                }

                let tableBody = document.createElement('tbody')
                table.appendChild(tableBody)

                function refreshView() {
                    tableBody.innerHTML = ''
                    const replaceableItems = renderTableRows(all_items.filter(FILTER_PREDICATES[activeFilter]), tableBody)
                    setupReplaceAllButton(replaceAllDiv, replaceableItems)
                }

                refreshView()
            }

            function setupReplaceAllButton(container, replaceableItems) {
                container.innerHTML = ''
                if (replaceableItems.length === 0) return

                let replaceAllButton = document.createElement('a')
                replaceAllButton.setAttribute('is', 'emby-linkbutton')
                replaceAllButton.setAttribute('class', 'raised button-submit block emby-button')
                replaceAllButton.setAttribute('style', 'white-space: nowrap;')
                replaceAllButton.setAttribute('title', translate('replace_all_button_title'))
                replaceAllButton.setAttribute('target', '_blank')
                replaceAllButton.innerText = translate('replace_all_button')
                replaceAllButton.addEventListener('click', async () => {
                    replaceAllButton.innerText = translate('replacing_button')
                    replaceAllButton.style.opacity = '0.6'
                    replaceAllButton.style.pointerEvents = 'none'
                    for (const entry of replaceableItems) {
                        await replaceWithThemerTheme(
                            entry.id,
                            entry.issueUrl,
                            entry.tableColumnContribute,
                            entry.tableColumnStatus,
                            entry.replaceButton
                        )
                    }
                    replaceAllButton.style.display = 'none'
                })
                container.appendChild(replaceAllButton)
            }

            function renderTableRows(items, tableBody) {
                const BUTTON_KEYS = { themerr: 'edit_button', user: 'contribute_button' }
                const replaceableItems = []

                // loop over items
                for (let item in items) {
                    console.log(LogPrefix + "------------------")
                    console.log(LogPrefix + "item: " + item)
                    console.log(LogPrefix + "name: " + items[item]["name"])
                    console.log(LogPrefix + "id: " + items[item]["id"])
                    console.log(LogPrefix + "issue_url: " + items[item]["issue_url"])
                    console.log(LogPrefix + "type: " + items[item]["type"])
                    console.log(LogPrefix + "theme_provider: " + items[item]["theme_provider"])
                    console.log(LogPrefix + "year: " + items[item]["year"])
                    console.log(LogPrefix + "in_themerr_db: " + items[item]["in_themerr_db"])

                    // create table row
                    let tableRow = document.createElement('tr')
                    tableBody.appendChild(tableRow)

                    // create table columns
                    let tableColumnTitle = document.createElement('td')
                    tableColumnTitle.setAttribute('class', 'detailTableBodyCell')
                    tableColumnTitle.innerText = items[item]["name"]
                    tableRow.appendChild(tableColumnTitle)

                    let tableColumnYear = document.createElement('td')
                    tableColumnYear.setAttribute('class', 'detailTableBodyCell')
                    tableColumnYear.innerText = items[item]["year"]
                    tableRow.appendChild(tableColumnYear)

                    let tableColumnType = document.createElement('td')
                    tableColumnType.setAttribute('class', 'detailTableBodyCell')
                    tableColumnType.innerText = translate(items[item]["type"].toLowerCase())
                    tableRow.appendChild(tableColumnType)

                    const themeProvider = items[item]["theme_provider"]
                    const inThemerrDb = items[item]["in_themerr_db"]

                    let tableColumnContribute = document.createElement('td')
                    tableColumnContribute.setAttribute('class', 'detailTableBodyCell')

                    let tableColumnStatus = document.createElement('td')
                    tableColumnStatus.setAttribute('class', 'detailTableBodyCell')

                    if (inThemerrDb === true && themeProvider === 'user') {
                        let replaceButton = document.createElement('a')
                        replaceButton.setAttribute('is', 'emby-linkbutton')
                        replaceButton.setAttribute('class', 'raised button-submit block emby-button')
                        replaceButton.setAttribute('title', translate('replace_button_title'))
                        replaceButton.setAttribute('target', '_blank')
                        replaceButton.addEventListener('click', () => replaceWithThemerTheme(items[item]["id"], items[item]["issue_url"], tableColumnContribute, tableColumnStatus, replaceButton))
                        replaceButton.innerText = translate('replace_button')
                        tableColumnContribute.appendChild(replaceButton)
                        replaceableItems.push({
                            id: items[item]["id"],
                            issueUrl: items[item]["issue_url"],
                            tableColumnContribute,
                            tableColumnStatus,
                            replaceButton,
                        })
                    } else if (inThemerrDb === true && themeProvider !== 'themerr') {
                        let availableText = document.createElement('span')
                        availableText.setAttribute('style', 'font-size: 0.9em; color: grey;')
                        availableText.innerText = translate('available_in_themerr_db')
                        tableColumnContribute.appendChild(availableText)
                    } else {
                        let contributeButton = document.createElement('a')
                        contributeButton.setAttribute('is', 'emby-linkbutton')
                        contributeButton.setAttribute('class', 'raised button-submit block emby-button')
                        contributeButton.setAttribute('target', '_blank')
                        contributeButton.setAttribute('href', items[item]["issue_url"])
                        contributeButton.innerText = translate(BUTTON_KEYS[themeProvider] || 'add_button')
                        tableColumnContribute.appendChild(contributeButton)
                    }
                    tableRow.appendChild(tableColumnContribute)

                    const status = STATUS_CONFIG[themeProvider] || { icon: 'cancel', color: '#ff0000', key: 'no_theme_song' }

                    let statusSpan = document.createElement('span')
                    let statusText = document.createElement('span')
                    statusSpan.setAttribute('class', 'material-icons')
                    statusText.setAttribute('class', 'detailTableBodyCell')
                    statusSpan.classList.add(status.icon)
                    statusSpan.setAttribute('style', 'margin-right: 6px; color: ' + status.color + ';')
                    statusText.innerText = translate(status.key)
                    tableColumnStatus.appendChild(statusSpan)
                    tableColumnStatus.appendChild(statusText)
                    tableRow.appendChild(tableColumnStatus)
                }

                return replaceableItems
            }

            function localize() {
                if (!translations) {
                    return;
                }
                let elements = document.querySelectorAll('[data-localize]')
                for (let element of elements) {
                    let key = element.getAttribute('data-localize');
                    element.innerText = translate(key);
                }
            }

            function initializePage() {
                getTranslations().then(() => {
                    localize();
                    updateProgress();
                })
            }

            // on ready
            document.getElementById('ThemerrConfigPage').addEventListener('pageshow', function () {
                console.log('pageshow event hit');
                initializePage();
            });

            document.getElementById('refresh-library').addEventListener('click', download);
        })();
        </script>
    </div>
</body>
</html>
